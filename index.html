<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería de Superhéroes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="bg-dark text-white py-4 mb-4">
      <div class="container">
        <h1 class="text-center m-0">Galería de Superhéroes</h1>
      </div>
    </header>

    <main class="container">
      <!-- Card que contiene el formulario de agregar personaje -->
      <section class="card mb-4 shadow-sm">
        <div class="card-body">
          <h2 class="card-title h5">Agregar personaje</h2>
          <div class="row g-2">
            <div class="col-md-5">
              <input
                type="text"
                id="input-nombre"
                class="form-control"
                placeholder="Nombre"
              />
            </div>
            <div class="col-md-5">
              <input
                type="text"
                id="input-imagen"
                class="form-control"
                placeholder="URL de la imagen"
              />
            </div>
            <div class="col-md-2 d-grid">
              <button id="btn-agregar" class="btn btn-success">Agregar</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Filtro por nombre -->
      <section class="row g-2 mb-4">
        <div class="col-md-8">
          <input
            type="text"
            id="input-filtro"
            class="form-control"
            placeholder="Buscar por nombre..."
          />
        </div>
        <div class="col-md-2 d-grid">
          <button id="btn-filtrar" class="btn btn-primary">Filtrar</button>
        </div>
        <div class="col-md-2 d-grid">
          <button id="btn-mostrar-todos" class="btn btn-secondary">
            Mostrar todos
          </button>
        </div>
      </section>

      <!-- Alerta cuando no se encuentran ningun personaje en el filtro -->
      <div
        id="alerta"
        class="alert alert-warning"
        role="alert"
        style="display: none"
      >
        No se encontraron personajes.
      </div>

      <!-- Contenedor de las cards de personajes -->
      <section id="galeria" class="row g-3"></section>
    </main>

    <script src="assets/js/app.js"></script>
  </body>
</html>
